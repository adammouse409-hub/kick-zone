<!DOCTYPE html>
<html lang="en" data-theme="dark" data-lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KickZone – Live Football Scores & Stats</title>
  <meta name="description" content="KickZone – The world's best football platform. Live scores, standings, fixtures, stats, and more for all top leagues." />
  <meta property="og:title" content="KickZone – Live Football" />
  <meta property="og:description" content="Live scores, standings, fixtures, and stats for all top leagues." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ========== NAVBAR ========== -->
<nav class="navbar" id="navbar" role="navigation" aria-label="Main Navigation">
  <div class="nav-container">
    <a href="#/" class="nav-logo" id="nav-logo">
      <div class="logo-icon"><i class="fas fa-futbol"></i></div>
      <span class="logo-text">Kick<span class="logo-accent">Zone</span></span>
    </a>

    <div class="nav-links" id="nav-links">
      <a href="#/" class="nav-link" data-i18n="nav_home"><i class="fas fa-home"></i> <span>Home</span></a>
      <a href="#/live" class="nav-link" data-i18n="nav_live"><i class="fas fa-circle live-dot"></i> <span>Live</span></a>
      <a href="#/schedule" class="nav-link" data-i18n="nav_schedule"><i class="fas fa-calendar"></i> <span>Schedule</span></a>
      <a href="#/news" class="nav-link" data-i18n="nav_news"><i class="fas fa-newspaper"></i> <span>News</span></a>
      <a href="#/ucl" class="nav-link" data-i18n="nav_ucl"><i class="fas fa-trophy"></i> <span>UCL</span></a>
      <a href="#/favorites" class="nav-link protected-link" data-i18n="nav_favorites"><i class="fas fa-heart"></i> <span>Favorites</span></a>
    </div>

    <div class="nav-actions">
      <div class="search-wrap">
        <button class="icon-btn" id="search-toggle" aria-label="Search"><i class="fas fa-search"></i></button>
        <div class="search-dropdown" id="search-dropdown">
          <input type="text" id="search-input" placeholder="Search clubs, players, leagues..." autocomplete="off" />
          <div class="search-results" id="search-results"></div>
        </div>
      </div>

      <button class="icon-btn" id="theme-toggle" aria-label="Toggle Theme"><i class="fas fa-moon"></i></button>

      <button class="icon-btn" id="lang-toggle" aria-label="Toggle Language">
        <span id="lang-label">AR</span>
      </button>

      <div class="nav-user" id="nav-user">
        <button class="btn-primary" id="login-btn" data-i18n="nav_login">Login</button>
      </div>

      <button class="hamburger" id="hamburger" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobile-menu" role="menu">
    <a href="#/" class="mobile-link" data-i18n="nav_home"><i class="fas fa-home"></i> <span>Home</span></a>
    <a href="#/live" class="mobile-link" data-i18n="nav_live"><i class="fas fa-circle live-dot"></i> <span>Live</span></a>
    <a href="#/schedule" class="mobile-link" data-i18n="nav_schedule"><i class="fas fa-calendar"></i> <span>Schedule</span></a>
    <a href="#/news" class="mobile-link" data-i18n="nav_news"><i class="fas fa-newspaper"></i> <span>News</span></a>
    <a href="#/ucl" class="mobile-link" data-i18n="nav_ucl"><i class="fas fa-trophy"></i> <span>UCL</span></a>
    <a href="#/favorites" class="mobile-link protected-link" data-i18n="nav_favorites"><i class="fas fa-heart"></i> <span>Favorites</span></a>
    <a href="#/profile" class="mobile-link protected-link" data-i18n="nav_profile"><i class="fas fa-user"></i> <span>Profile</span></a>
    <div class="mobile-divider"></div>
    <button class="mobile-link" id="mobile-theme-toggle"><i class="fas fa-moon"></i> <span data-i18n="toggle_theme">Dark Mode</span></button>
    <button class="mobile-link" id="mobile-lang-toggle"><i class="fas fa-globe"></i> <span>العربية</span></button>
  </div>
</nav>

<!-- ========== MAIN CONTENT ========== -->
<main id="app-root" role="main">
  <!-- Pages render here -->
  <div class="page-loader" id="page-loader">
    <div class="loader-ball"></div>
  </div>
</main>

<!-- ========== TOAST ========== -->
<div id="toast-container" aria-live="polite"></div>

<!-- ========== AUTH MODAL (Login/Register) ========== -->
<div class="modal-overlay" id="auth-modal" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title">
  <div class="modal-box auth-modal-box">
    <button class="modal-close" id="auth-modal-close" aria-label="Close">&times;</button>
    <div id="auth-modal-content"><!-- injected --></div>
  </div>
</div>

<!-- ========== MATCH DETAIL MODAL ========== -->
<div class="modal-overlay" id="match-modal" role="dialog" aria-modal="true">
  <div class="modal-box match-modal-box">
    <button class="modal-close" id="match-modal-close" aria-label="Close">&times;</button>
    <div id="match-modal-content"></div>
  </div>
</div>

<!-- ========== SCRIPTS ========== -->
<script src="app.js"></script>
</body>
</html>
